<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#06b6d4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0891b2;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:white;stop-opacity:0.1" />
      <stop offset="100%" style="stop-color:white;stop-opacity:0" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="#00000022"/>
    </filter>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="white" stroke-width="0.5" stroke-opacity="0.05"/>
    </pattern>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="600" fill="url(#bg-grad)" rx="16"/>
  <rect width="800" height="600" fill="url(#grid)" rx="16"/>
  <rect width="800" height="300" fill="url(#accent-grad)" rx="16"/>
  
  <!-- Decorative circles -->
  <circle cx="700" cy="80" r="120" fill="white" opacity="0.06"/>
  <circle cx="100" cy="500" r="80" fill="white" opacity="0.04"/>
  <circle cx="650" cy="450" r="60" fill="white" opacity="0.08"/>
  <circle cx="200" cy="100" r="40" fill="white" opacity="0.05"/>
  
  <!-- Centered content box -->
  <rect x="80" y="150" width="640" height="300" fill="rgba(255,255,255,0.15)" rx="12" filter="url(#shadow)"/>
  
  <!-- Icon placeholder - abstract shape -->
  <g transform="translate(360, 180)">
    <rect x="0" y="0" width="80" height="80" rx="20" fill="#f43f5e" opacity="0.9"/>
    <path d="M 20 30 L 40 50 L 60 30 M 20 50 L 40 70 L 60 50" stroke="white" stroke-width="4" fill="none" stroke-linecap="round"/>
  </g>
  
  <!-- Title -->
  <text x="400" y="320" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="48" font-weight="800" fill="white" letter-spacing="-1">Business</text>
  
  <!-- Subtitle -->
  <text x="400" y="365" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="28" font-weight="600" fill="white" opacity="0.9">Templates Pack</text>
  
  <!-- Divider line -->
  <line x1="350" y1="375" x2="450" y2="375" stroke="white" stroke-width="3" stroke-linecap="round" opacity="0.5"/>
  
  <!-- Detail text -->
  <text x="400" y="410" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="500" fill="white" opacity="0.8">25 Ready-to-Use Forms</text>
  
  <!-- Digital Pedia branding -->
  <text x="400" y="500" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="600" fill="white" opacity="0.6" letter-spacing="2">DIGITAL PEDIA</text>
  
  <!-- Bottom bar -->
  <rect x="80" y="520" width="640" height="4" rx="2" fill="white" opacity="0.15"/>
</svg>